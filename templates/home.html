    <style>
      .box {
          background-color: rgba(255, 255, 255, 0.8); /* Adjust the alpha value (0.8 for 80% opacity) */
          border: 1px solid #ddd;
          padding: 20px;
          border-radius: 8px;
          margin-bottom: 20px;
      }
      
      .box h2 {
          color: #007bff;
      }
      
      .box p {
          color: #555;
      }
      
      .box a {
          color: #fff;
      }
      @keyframes typing {
        from {
            width: 0;
        }
        to {
            width: 100%;
        }
    }
    /* Add this to your style.css file */

    @keyframes typing {
        from {
            width: 0;
        }
        to {
            width: 100%;
        }
    }
    
    h1 span {
        display: inline-block;
        overflow: hidden;
        white-space: nowrap;
        animation: typing 6s steps(30) forwards, blink-caret 1s step-end infinite;
    }
    h1 {
        color: MediumBlue;
        }
    
    @keyframes blink-caret {
        from, to {
            border-right: 3px solid transparent;
        }
        50% {
            border-right: 3px solid #fff; /* Adjust the color as needed */
        }
    }
  </style>
